name: CI Pipeline

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          cd frontend
          npm install

      # 4. Run tests
      - name: Run tests
        run: |
          cd frontend
          npm test -- --watchAll=false

      # 5. Build Docker image
      - name: Build Docker Image
        run: docker build -t docker-react -f ./frontend/Dockerfile.dev ./frontend
